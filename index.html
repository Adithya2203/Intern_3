<!DOCTYPE html>
<html>

<head>

<title>Neo Learning Dashboard</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

<header>

<h1>Neo Learning Dashboard</h1>

<button id="theme">Theme</button>

</header>

<div class="container">

<div class="card carouselCard">

<h2>Visual Stream</h2>

<div class="carousel">

<img id="image">

<div class="dots" id="dots"></div>

</div>

</div>

<div class="card quizCard">

<h2>Smart Quiz</h2>

<div class="progressBar">

<div id="progress"></div>

</div>

<div id="timer"></div>

<p id="question"></p>

<div id="answers"></div>

<div id="score"></div>

</div>

<div class="card quoteCard">

<h2>Developer Insight</h2>

<button id="quoteBtn">Generate</button>

<p id="quote"></p>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
